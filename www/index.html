<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#6366f1" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Centa</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script>
    // Paint the saved theme before anything renders, to avoid a flash.
    (function () {
      try {
        var th = localStorage.getItem('ft_theme') || 'system';
        var resolved = th === 'system'
          ? (matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark')
          : th;
        document.documentElement.dataset.theme = resolved;
        document.documentElement.dataset.accent = localStorage.getItem('ft_accent') || 'indigo';
      } catch (e) {}
    })();
  </script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div id="app">
  <!-- App screens and scripts are added in the following commits. -->
</div>
</body>
</html>
